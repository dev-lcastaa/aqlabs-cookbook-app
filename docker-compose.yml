services:
  db:
    image: postgres:17-alpine
    container_name: cookbook_db
    environment:
      POSTGRES_USER: cookbook
      POSTGRES_PASSWORD: cookbook
      POSTGRES_DB: cookbook_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookbook -d cookbook_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cookbook_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://cookbook:cookbook@db:5432/cookbook_db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: cookbook_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
